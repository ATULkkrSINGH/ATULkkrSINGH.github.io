<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="forgot-password.css">
</head>
<body>
    <div class="reset-container">
        
        <!-- Step 1: Email Input -->
        <div id="step-1" class="step active">
            <h2>Reset Password</h2>
            <form id="emailForm">
                <div class="input-group">
                    <label for="resetEmail">Email</label>
                    <input type="email" id="resetEmail" placeholder="Enter your email" required>
                </div>
                <button type="submit" class="btn-primary">Send OTP</button>
            </form>
        </div>

        <!-- Step 2: OTP Verification -->
        <div id="step-2" class="step">
            <h2>Verify OTP</h2>
            <form id="otpForm">
                <div class="input-group">
                    <label for="otpCode">OTP</label>
                    <input type="text" id="otpCode" placeholder="Enter OTP (123456)" required>
                </div>
                <p class="error-msg" id="otpError"></p>
                <div class="resend-link">
                    <a href="#" id="resendOtp">Resend OTP</a>
                </div>
                <button type="submit" class="btn-primary">Verify OTP</button>
            </form>
        </div>

        <!-- Step 3: Set New Password -->
        <div id="step-3" class="step">
            <h2>Set New Password</h2>
            <form id="passwordForm">
                <div class="input-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password" required>
                </div>
                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                </div>
                <p class="error-msg" id="passwordError"></p>
                <button type="submit" class="btn-primary">Reset Password</button>
            </form>
        </div>

        <!-- Success Message -->
        <div id="step-success" class="step">
            <h2>Success!</h2>
            <p class="success-msg">Password successfully updated</p>
            <a href="index.html" class="btn-primary" style="display: block; text-align: center; text-decoration: none; margin-top: 20px;">Back to Login</a>
        </div>

    </div>

    <script src="forgot-password.js"></script>
</body>
</html>
