<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Glassmorphism Login</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            blue: '#054497',
                            dark: '#02245b',
                            input: '#ffffff',
                            btn: '#022b64'
                        }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'float-delayed': 'float 6s ease-in-out 3s infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Babel standalone for in-browser JSX parsing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="text-white overflow-hidden">
    <div id="root"></div>

    <!-- Inline React JS so that it works perfectly when you double-click the HTML file -->
    <script type="text/babel" data-type="module">
        import React, { useState } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { motion } from 'https://esm.sh/framer-motion@10.16.4';

        const App = () => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [showPassword, setShowPassword] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                console.log('Login attempt', { email, password });
            };

            return (
                <div className="min-h-screen flex items-center justify-center relative font-sans w-full p-4">
                    
                    {/* Background decorations simulating 3D objects */}
                    <div className="absolute inset-0 w-full h-full pointer-events-none overflow-hidden flex items-center justify-center">
                        {/* Inner Dark Rectangle */}
                        <div className="absolute w-[80%] max-w-[900px] h-[70vh] min-h-[500px] bg-[#00173d]/40 rounded-3xl backdrop-blur-sm z-0"></div>

                        {/* Floating Shapes */}
                        <div className="absolute top-[15%] left-[25%] w-16 h-16 rounded-full shape animate-float z-0" style={{background: 'linear-gradient(135deg, #93c5fd, #3b82f6)'}}></div>
                        
                        <div className="absolute top-[25%] right-[25%] w-24 h-24 rounded-full border-[15px] border-[#3b82f6] opacity-80 animate-float-delayed z-0" style={{boxShadow: 'inset 0 0 10px rgba(0,0,0,0.3), 0 10px 20px rgba(0,0,0,0.3)'}}></div>
                        
                        <div className="absolute bottom-[20%] left-[20%] w-32 h-10 rounded-full shape animate-float-delayed z-0" style={{transform: 'rotate(-20deg)'}}></div>
                        
                        <div className="absolute bottom-[15%] right-[20%] w-40 h-16 rounded-full shape animate-float z-0" style={{background: 'linear-gradient(135deg, #60a5fa, #1d4ed8)', transform: 'rotate(15deg)'}}></div>

                        <div className="absolute top-[10%] left-[45%] w-20 h-8 rounded-full shape animate-float z-0" style={{transform: 'rotate(45deg)', borderRadius: '20px', background: '#2563eb'}}></div>
                        
                        {/* Squiggles/Waves using multiple shapes combined */}
                        <div className="absolute top-[40%] right-[15%] flex gap-2 animate-float-delayed z-0" style={{transform: 'rotate(-10deg)'}}>
                             <div className="w-8 h-8 rounded-full bg-[#60a5fa] shadow-lg"></div>
                             <div className="w-8 h-8 rounded-full bg-[#3b82f6] shadow-lg mt-4"></div>
                             <div className="w-8 h-8 rounded-full bg-[#2563eb] shadow-lg"></div>
                        </div>
                    </div>

                    {/* Glassmorphism Login Card */}
                    <motion.div 
                        initial={{ opacity: 0, scale: 0.95, y: 20 }} 
                        animate={{ opacity: 1, scale: 1, y: 0 }} 
                        transition={{ duration: 0.6, ease: "easeOut" }}
                        className="relative z-10 w-full max-w-[400px] p-8 md:p-10 bg-white/10 backdrop-blur-xl border border-white/20 rounded-[2rem] shadow-2xl flex flex-col"
                    >
                        <div className="text-center mb-6">
                            <h1 className="text-white font-bold text-lg tracking-wide">Your logo</h1>
                        </div>

                        <div className="mb-6">
                            <h2 className="text-2xl font-bold text-white tracking-wide">Login</h2>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-white/90 text-[13px] mb-1.5 font-medium ml-0.5">Email</label>
                                <div className="relative">
                                    <input 
                                        type="email" 
                                        value={email}
                                        onChange={(e) => setEmail(e.target.value)}
                                        placeholder="username@gmail.com" 
                                        className="w-full bg-white text-gray-900 rounded-lg px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-[#60a5fa] transition-all placeholder:text-gray-400 font-medium" 
                                        required
                                    />
                                </div>
                            </div>

                            <div>
                                <label className="block text-white/90 text-[13px] mb-1.5 font-medium ml-0.5">Password</label>
                                <div className="relative flex items-center">
                                    <input 
                                        type={showPassword ? "text" : "password"} 
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        placeholder="Password" 
                                        className="w-full bg-white text-gray-900 rounded-lg px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-[#60a5fa] transition-all placeholder:text-gray-400 font-medium pr-10"
                                        required 
                                    />
                                    <button 
                                        type="button" 
                                        onClick={() => setShowPassword(!showPassword)}
                                        className="absolute right-3 text-gray-400 hover:text-gray-600 transition-colors"
                                    >
                                        {showPassword ? (
                                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="w-4 h-4">
                                                <path strokeLinecap="round" strokeLinejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                                            </svg>
                                        ) : (
                                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="w-4 h-4">
                                                <path strokeLinecap="round" strokeLinejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                                <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                            </svg>
                                        )}
                                    </button>
                                </div>
                                <div className="mt-2 ml-0.5">
                                    <a href="#" className="text-white/80 hover:text-white text-[11px] transition-colors">Forgot Password?</a>
                                </div>
                            </div>

                            <motion.button 
                                whileHover={{ scale: 1.02 }}
                                whileTap={{ scale: 0.98 }}
                                type="submit"
                                className="w-full mt-4 bg-[#022b64] text-white font-medium rounded-lg px-4 py-3 text-sm hover:bg-[#033985] transition-all duration-300 shadow-lg border border-white/5"
                            >
                                Sign in
                            </motion.button>
                        </form>

                        <div className="mt-8 text-center">
                            <span className="text-white/70 text-[11px] tracking-wide">or continue with</span>
                            
                            <div className="flex justify-center gap-3 mt-4">
                                <motion.button 
                                    whileHover={{ scale: 1.05, y: -2 }}
                                    whileTap={{ scale: 0.95 }}
                                    className="w-[70px] h-9 rounded-md bg-white flex items-center justify-center hover:bg-gray-50 transition-colors shadow-sm"
                                >
                                    <svg className="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                                    </svg>
                                </motion.button>
                                <motion.button 
                                    whileHover={{ scale: 1.05, y: -2 }}
                                    whileTap={{ scale: 0.95 }}
                                    className="w-[70px] h-9 rounded-md bg-white flex items-center justify-center hover:bg-gray-50 transition-colors shadow-sm text-gray-900"
                                >
                                    <svg className="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M12,2C6.477,2,2,6.477,2,12c0,4.419,2.865,8.166,6.839,9.489c0.5,0.09,0.682-0.218,0.682-0.484c0-0.236-0.009-0.866-0.014-1.699c-2.782,0.602-3.369-1.34-3.369-1.34c-0.454-1.156-1.11-1.462-1.11-1.462c-0.908-0.62,0.069-0.608,0.069-0.608c1.004,0.071,1.532,1.03,1.532,1.03c0.892,1.529,2.341,1.087,2.91,0.831c0.092-0.646,0.35-1.086,0.636-1.336c-2.22-0.253-4.555-1.11-4.555-4.943c0-1.091,0.39-1.984,1.03-2.682C6.546,8.54,6.202,7.524,6.646,6.149c0,0,0.84-0.269,2.75,1.025C10.195,6.955,11.106,6.843,12,6.839c0.895,0.004,1.805,0.116,2.604,0.335c1.91-1.294,2.748-1.025,2.748-1.025c0.446,1.375,0.102,2.391,0.001,2.646c0.64,0.699,1.028,1.591,1.028,2.682c0,3.841-2.337,4.687-4.565,4.935c0.359,0.307,0.679,0.915,0.679,1.846c0,1.335-0.012,2.415-0.012,2.741c0,0.269,0.18,0.579,0.688,0.481C19.138,20.161,22,16.416,22,12C22,6.477,17.523,2,12,2z"/>
                                    </svg>
                                </motion.button>
                                <motion.button 
                                    whileHover={{ scale: 1.05, y: -2 }}
                                    whileTap={{ scale: 0.95 }}
                                    className="w-[70px] h-9 rounded-md bg-white flex items-center justify-center hover:bg-gray-50 transition-colors shadow-sm text-[#1877F2]"
                                >
                                    <svg className="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                                    </svg>
                                </motion.button>
                            </div>
                        </div>
                        
                        <div className="mt-8 text-center text-[11px]">
                            <span className="text-white/70">Don't have an account yet? </span>
                            <a href="#" className="text-white font-bold hover:underline ml-1 tracking-wide">Register for free</a>
                        </div>
                    </motion.div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
