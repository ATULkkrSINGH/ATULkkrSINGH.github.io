<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subjects Categories - Futuristic</title>
    <!-- Using Tailwind CSS v3 via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #020617; /* slate-950 */
            color: #f8fafc;
        }

        /* ----------------------------------
           1. Rotating Gradient Border
           ---------------------------------- */
        @property --angle {
            syntax: "<angle>";
            initial-value: 0deg;
            inherits: false;
        }
        @keyframes spin {
            to { --angle: 360deg; }
        }
        .border-rotate {
            position: relative;
            z-index: 1;
            /* Inner background is handled by child container */
        }
        .border-rotate::before,
        .border-rotate::after {
            content: '';
            position: absolute;
            inset: -2px;
            z-index: -1;
            border-radius: inherit;
            background: conic-gradient(from var(--angle), #a855f7, #3b82f6, #ec4899, #06b6d4, #a855f7);
            animation: spin 4s linear infinite;
        }
        .border-rotate::before {
            filter: blur(12px);
            opacity: 0.6;
            transition: opacity 0.3s ease, filter 0.3s ease;
        }
        .border-rotate:hover::before {
            opacity: 1;
            filter: blur(20px);
            animation-duration: 2s; /* speeds up on hover */
        }
        .border-rotate:hover::after {
            animation-duration: 2s;
        }

        /* ----------------------------------
           2. Glowing Animated Gradient (Linear)
           ---------------------------------- */
        @keyframes gradient-xy {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .border-glow-pulse {
            position: relative;
            z-index: 1;
        }
        .border-glow-pulse::before,
        .border-glow-pulse::after {
            content: '';
            position: absolute;
            inset: -2px;
            z-index: -1;
            border-radius: inherit;
            background: linear-gradient(45deg, #ff007f, #7928ca, #00d4ff, #ff007f);
            background-size: 300% 300%;
            animation: gradient-xy 4s ease infinite;
        }
        .border-glow-pulse::before {
            filter: blur(12px);
            opacity: 0.6;
            transition: opacity 0.3s ease, filter 0.3s ease;
        }
        .border-glow-pulse:hover::before {
            opacity: 1;
            filter: blur(20px);
            animation-duration: 2s;
        }
        .border-glow-pulse:hover::after {
            animation-duration: 2s;
        }

        /* ----------------------------------
           3. Dual-layer Shimmer Border
           ---------------------------------- */
        .border-shimmer {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.05); /* very light base border */
            border-radius: inherit;
            overflow: hidden;
        }
        .border-shimmer::before {
            content: '';
            position: absolute;
            inset: -2px;
            z-index: -1;
            border-radius: inherit;
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.8), rgba(236, 72, 153, 0.8), transparent);
            background-size: 200% 100%;
            animation: shimmer 3s infinite linear;
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            padding: 2px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .border-shimmer-glow {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3), inset 0 0 20px rgba(236, 72, 153, 0.3);
            z-index: -2;
            transition: all 0.3s ease;
        }
        .border-shimmer:hover .border-shimmer-glow {
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.6), inset 0 0 30px rgba(236, 72, 153, 0.6);
        }
        .border-shimmer:hover::before {
            animation-duration: 1.5s;
        }

        /* Glassmorphism Inner Container */
        .glass-inner {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: inherit;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.05);
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* ----------------------------------
           4. Search Bar Styles
           ---------------------------------- */
        .search-wrapper {
            transition: transform 0.3s ease;
        }
        .search-wrapper:focus-within {
            transform: scale(1.03); /* Expand slightly on focus */
        }
        
        .search-input {
            background: rgba(30, 41, 59, 0.6); /* #1e293b with opacity */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .search-input::placeholder {
            color: #cbd5e1;
            opacity: 0.6;
        }
        .search-input:focus {
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3), inset 0 0 10px rgba(6, 182, 212, 0.1);
            border-color: rgba(6, 182, 212, 0.4);
        }
        .search-btn {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.8), rgba(168, 85, 247, 0.8));
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .search-btn:hover {
            background: linear-gradient(135deg, rgba(59, 130, 246, 1), rgba(168, 85, 247, 1));
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.6);
        }
    </style>
</head>
<body class="antialiased min-h-screen py-16 px-4">

    <div class="max-w-6xl mx-auto">
        <!-- Search Bar Section -->
        <div class="search-container mb-12 mt-2 flex justify-center w-full px-4 relative z-20">
            <div class="relative w-full max-w-xl group search-wrapper">
                <div class="absolute inset-y-0 left-0 flex items-center pl-5 pointer-events-none">
                    <svg class="w-5 h-5 text-slate-400 group-focus-within:text-cyan-400 transition-colors duration-300" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z"/>
                    </svg>
                </div>
                <input type="text" id="course-search" class="search-input block w-full p-4 pl-14 text-base text-slate-200 rounded-[30px] border border-slate-700/50 outline-none transition-all duration-300 ease-in-out" placeholder="Search courses notes" autocomplete="off">
                <button type="button" class="absolute inset-y-2 right-2 px-6 text-sm font-medium text-white rounded-[22px] focus:ring-2 focus:ring-cyan-400 transition-all duration-300 search-btn">
                    Search
                </button>
            </div>
        </div>

        <!-- Header Section -->
        <div class="text-center mb-16 relative z-10">
            <h1 class="text-4xl md:text-5xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-purple-400 via-pink-500 to-cyan-400 tracking-tight drop-shadow-sm">Subjects Categories</h1>
            <p class="text-lg text-slate-400 max-w-2xl mx-auto font-light">
                Choose your subject and explore all available units in our futuristic dashboard
            </p>
        </div>

        <!-- Cards Layout -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            
            <!-- Card 1: Rotating Gradient Border (MATHS) -->
            <div class="rounded-3xl border-rotate transition-transform duration-300 hover:scale-[1.02] cursor-pointer group">
                <!-- Inner Glass Container -->
                <div class="glass-inner p-8">
                    <!-- Corner Glow Highlight (Bonus) -->
                    <div class="absolute top-0 right-0 w-24 h-24 bg-pink-500/20 blur-2xl rounded-full"></div>
                    
                    <div class="relative z-10 flex-grow">
                        <div class="flex justify-between items-start mb-6">
                            <h2 class="text-2xl font-bold text-white tracking-wide">MATHS</h2>
                            <span class="text-3xl bg-white/10 backdrop-blur-md p-3 rounded-full shadow-[0_0_15px_rgba(255,255,255,0.1)] group-hover:scale-110 group-hover:bg-white/20 transition-all duration-300">🔢</span>
                        </div>
                        
                        <div class="flex flex-wrap gap-2 mb-8">
                            <span class="px-5 py-1.5 bg-slate-800/80 text-slate-300 text-sm rounded-full border border-slate-700 font-medium hover:bg-pink-500/20 hover:text-pink-300 hover:border-pink-500/50 transition-all duration-300">unit 01</span>
                            <span class="px-5 py-1.5 bg-slate-800/80 text-slate-300 text-sm rounded-full border border-slate-700 font-medium hover:bg-pink-500/20 hover:text-pink-300 hover:border-pink-500/50 transition-all duration-300">unit 02</span>
                            <span class="px-5 py-1.5 bg-slate-800/80 text-slate-300 text-sm rounded-full border border-slate-700 font-medium hover:bg-pink-500/20 hover:text-pink-300 hover:border-pink-500/50 transition-all duration-300">unit 03</span>
                        </div>
                    </div>
                    
                    <div class="relative z-10 flex items-center justify-between text-pink-400 font-semibold mt-auto group-hover:text-pink-300 transition-colors w-full">
                        <span>Explore other units</span>
                        <div class="bg-slate-800 rounded-full p-2 shadow-sm group-hover:bg-pink-500/20 group-hover:shadow-[0_0_10px_rgba(236,72,153,0.5)] transition-all duration-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Card 2: Glowing Animated Linear Gradient (CODING) -->
            <div class="rounded-3xl border-glow-pulse transition-transform duration-300 hover:scale-[1.02] cursor-pointer group">
                <div class="glass-inner p-8">
                    <!-- Corner Glow Highlight -->
                    <div class="absolute bottom-0 left-0 w-32 h-32 bg-cyan-500/20 blur-2xl rounded-full"></div>

                    <div class="relative z-10 flex-grow">
                        <div class="flex justify-between items-start mb-6">
                            <h2 class="text-2xl font-bold text-white tracking-wide">CODING</h2>
                            <span class="text-3xl bg-white/10 backdrop-blur-md p-3 rounded-full shadow-[0_0_15px_rgba(255,255,255,0.1)] group-hover:scale-110 group-hover:bg-white/20 transition-all duration-300">💻</span>
                        </div>
                        
                        <div class="flex flex-wrap gap-2 mb-8">
                            <span class="px-5 py-1.5 bg-slate-800/80 text-slate-300 text-sm rounded-full border border-slate-700 font-medium hover:bg-cyan-500/20 hover:text-cyan-300 hover:border-cyan-500/50 transition-all duration-300">unit 01</span>
                            <span class="px-5 py-1.5 bg-slate-800/80 text-slate-300 text-sm rounded-full border border-slate-700 font-medium hover:bg-cyan-500/20 hover:text-cyan-300 hover:border-cyan-500/50 transition-all duration-300">unit 02</span>
                            <span class="px-5 py-1.5 bg-slate-800/80 text-slate-300 text-sm rounded-full border border-slate-700 font-medium hover:bg-cyan-500/20 hover:text-cyan-300 hover:border-cyan-500/50 transition-all duration-300">unit 03</span>
                        </div>
                    </div>
                    
                    <div class="relative z-10 flex items-center justify-between text-cyan-400 font-semibold mt-auto group-hover:text-cyan-300 transition-colors w-full">
                        <span>Explore other units</span>
                        <div class="bg-slate-800 rounded-full p-2 shadow-sm group-hover:bg-cyan-500/20 group-hover:shadow-[0_0_10px_rgba(6,182,212,0.5)] transition-all duration-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Card 3: Dual-layer Shimmer Sweep (Mind Map) -->
            <div class="rounded-3xl border-shimmer transition-transform duration-300 hover:scale-[1.02] cursor-pointer group">
                <div class="border-shimmer-glow"></div>
                <div class="glass-inner p-8">
                    <!-- Corner Glow Highlight -->
                    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-40 h-40 bg-purple-500/20 blur-3xl rounded-full"></div>

                    <div class="relative z-10 flex-grow">
                        <div class="flex justify-between items-start mb-6">
                            <h2 class="text-2xl font-bold text-white tracking-wide">Mind Map of All</h2>
                            <span class="text-3xl bg-white/10 backdrop-blur-md p-3 rounded-full shadow-[0_0_15px_rgba(255,255,255,0.1)] group-hover:scale-110 group-hover:bg-white/20 transition-all duration-300">🧠</span>
                        </div>
                        
                        <div class="flex flex-wrap gap-2 mb-8 opacity-0 pointer-events-none md:block hidden">
                            <!-- Spacer to maintain equal height with other cards -->
                            <span class="px-5 py-1.5 text-sm">&nbsp;</span>
                        </div>
                    </div>
                    
                    <div class="relative z-10 flex items-center justify-between text-purple-400 font-semibold mt-auto group-hover:text-purple-300 transition-colors w-full">
                        <span>Explore Full Mind Map</span>
                        <div class="bg-slate-800 rounded-full p-2 shadow-sm group-hover:bg-purple-500/20 group-hover:shadow-[0_0_10px_rgba(168,85,247,0.5)] transition-all duration-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Search Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('course-search');
            
            // Keyboard shortcut to focus search bar (Press '/')
            document.addEventListener('keydown', (e) => {
                if (e.key === '/' && document.activeElement !== searchInput) {
                    e.preventDefault();
                    searchInput.focus();
                }
            });

            // Search interaction simulation
            const searchBtn = document.querySelector('.search-btn');
            const performSearch = () => {
                if (searchInput.value.trim() !== '') {
                    console.log('Searching for:', searchInput.value);
                    // Add actual search filtering logic here
                }
            };

            searchBtn.addEventListener('click', performSearch);
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });
        });
    </script>
</body>
</html>
